services:
  argus-backend:
    build: ./backend
    container_name: argus-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    network_mode: host   # Required for WoL broadcast packets
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
